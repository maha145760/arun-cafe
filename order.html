<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arun Cafe - Order</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* Header */
header{
    background:#8B4513;
    padding:15px;
    text-align:center;
}

header h1{
    color:white;
    margin-bottom:10px;
}

nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:30px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav ul li a:hover{
    color:#ffd39b;
}

/* Order Box */
.container{
    width:380px;
    background:white;
    margin:50px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.container h2{
    margin-bottom:20px;
    color:#8B4513;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    height:90px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    background:#8B4513;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5d2d0c;
}

#successMessage{
    display:none;
    color:green;
    margin-top:15px;
    font-weight:bold;
}
</style>

<script>
function orderSuccess(){
    document.getElementById("successMessage").style.display="block";
    return false;
}
</script>

</head>
<body>

<header>
    <h1>☕ Arun Cafe</h1>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<div class="container">

<h2>Place Your Order</h2>

<form onsubmit="return orderSuccess()">

<input type="text" placeholder="Your Name" required>

<input type="tel" placeholder="Mobile Number" required>

<textarea placeholder="Address" required></textarea>

<button type="submit">Confirm Order</button>

<p id="successMessage">
✅ Order placed successfully!

</p>

</form>
<script>
function orderSuccess() {
    document.getElementById("successMessage").style.display = "block";

    setTimeout(function() {
        window.location.href = "menu.html";
    }, 2000);

    return false;
}
</script>
</div>

</body>
</html>
